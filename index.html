<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auto Racing Pro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <nav class="navbar">
      <div class="logo">AUTO<span>RACING</span></div>
      <ul class="nav-links">
        <li><a href="#home">Acasă</a></li>
        <li><a href="#events">Evenimente</a></li>
        <li><a href="#news">Știri</a></li>
        <li><a href="#contact">Contact</a></li>
        <li><a href="admin.html">Admin</a></li>
      </ul>
    </nav>

    <section id="home" class="hero-content">
      <h1>Trăiește viteza</h1>
      <p>Evenimente auto, pagini dedicate și administrare simplă.</p>
      <a href="#events" class="btn">Vezi evenimentele</a>
    </section>
  </header>

  <main>
    <section id="events" class="section">
      <h2>Evenimente Auto</h2>
      <div id="eventsContainer" class="events-grid"></div>
    </section>

    <section id="news" class="section">
      <h2>Știri Auto</h2>
      <div id="newsContainer" class="events-grid"></div>
    </section>

    <section id="contact" class="section contact-section">
      <h2>Contact</h2>
      <form class="contact-form">
        <input type="text" placeholder="Numele tău" required />
        <input type="email" placeholder="Email" required />
        <textarea placeholder="Mesajul tău" rows="5" required></textarea>
        <button type="submit" class="btn">Trimite</button>
      </form>
    </section>
  </main>

  <footer class="footer">
    <p>© 2026 AutoRacing</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
